# ebpf-sentinel agent configuration

host: sentinel-host-01

rules_dir: rules

monitored_paths:
  - /etc/passwd
  - /etc/shadow
  - /etc/sudoers
  - /etc/ssh/sshd_config

sinks:
  - type: stdout
  - type: ndjson
    path: /tmp/sentinel/events.ndjson

triage:
  enabled: false
  api_key_env: ANTHROPIC_API_KEY
  model: claude-sonnet-4-20250514
  max_tokens: 1024

metrics:
  enabled: true
  listen: "0.0.0.0:9090"

suppression:
  default:
    max_alerts: 10
    window_secs: 60
  rules:
    FIM-001:
      max_alerts: 1
      window_secs: 300
