syntax = "proto3";

package sentinel.v1;

message Event {
  string kind = 1;
  uint32 pid = 2;
  uint32 ppid = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint64 timestamp_ns = 6;
  string comm = 7;
  string path = 8;
  uint32 dst_addr = 9;
  uint32 dst_port = 10;
  uint32 flags = 11;
  repeated string lineage = 12;
  string host = 13;
  string parent_comm = 14;
  uint32 addr_family = 15;
  string dst_addr_v6 = 16;
}

message MitreAttack {
  string tactic = 1;
  string technique = 2;
  string subtechnique = 3;
}

message TriageOutcome {
  string severity = 1;
  string summary = 2;
  string reasoning = 3;
  repeated string mitre = 4;
  repeated string remediation = 5;
  double false_positive_likelihood = 6;
}

message Alert {
  string rule_id = 1;
  string title = 2;
  string severity = 3;
  string description = 4;
  repeated string tags = 5;
  Event event = 6;
  uint64 timestamp_ns = 7;
  string host = 8;
  MitreAttack mitre = 9;
  TriageOutcome triage = 10;
}

message StreamAck {
  uint64 received = 1;
}

service SentinelIngest {
  rpc PublishEvent(Event) returns (StreamAck);
  rpc PublishAlert(Alert) returns (StreamAck);
}
