name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (eBPF build)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libelf-dev

      - name: Build release
        run: cargo build --release -p sentinel --bin sentinel --bin grpc-ingest

      - name: Run unit tests
        run: cargo test --release -p sentinel --lib -p sentinel-common

      - name: Rustfmt
        run: cargo +stable fmt --all -- --check

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly (eBPF build)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm libelf-dev

      - name: Build release (integration)
        run: cargo build --release -p sentinel

      - name: Integration tests (userspace)
        run: cargo test --release -p sentinel --test integration

      - name: Privileged eBPF integration
        run: |
          # sudo resets PATH on Ubuntu; preserve Rust toolchain locations for root.
          sudo env \
            "PATH=${PATH}" \
            "HOME=${HOME}" \
            "CARGO_HOME=${CARGO_HOME:-${HOME}/.cargo}" \
            "RUSTUP_HOME=${RUSTUP_HOME:-${HOME}/.rustup}" \
            "$(command -v cargo)" test --release -p sentinel --test integration -- --ignored --test-threads=1
