id: T1003.008-001
title: Access to Credential Store
description: Credential-bearing file opened on the endpoint.
severity: high
enabled: true
tags: [credential-access, linux]
mitre:
  tactic: Credential Access
  technique: T1003.008
conditions:
  all:
    - field: kind
      op: eq
      value: open
    - field: path
      op: prefix
      value: /etc/shadow
actions: [alert]
